global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    metrics_path: "/actuator/prometheus"

  - job_name: "node_exporter"
    static_configs:
      - targets: [ "node_exporter:9100" ]

  - job_name: "auth"
    static_configs:
      - targets: ["auth:8080"]
    metrics_path: "/actuator/prometheus"

  - job_name: "chat"
    static_configs:
      - targets: [ "chat:8081" ]
    metrics_path: "/actuator/prometheus"

  - job_name: "message"
    static_configs:
      - targets: [ "message:8082" ]
    metrics_path: "/actuator/prometheus"

  - job_name: "user"
    static_configs:
      - targets: [ "user:8083" ]
    metrics_path: "/actuator/prometheus"