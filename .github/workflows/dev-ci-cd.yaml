name: develop ci/cd pipeline

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ['authService', 'chatService', 'messageService', 'userService']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Test ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          chmod +x gradlew
          ./gradlew test

      - name: Build ${{ matrix.service }}
        run: |
            cd ${{ matrix.service }}
            chmod +x gradlew
            ./gradlew assemble -x test

      - name: Convert service name for artifact
        run: |
          SERVICE_NAME=${{ matrix.service }}
          ARTIFACT_NAME=$(echo "$SERVICE_NAME" | sed 's/Service/-service/')
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
            name: build-${{ env.ARTIFACT_NAME }}
            path: ${{ matrix.service }}/build/libs/*.jar

  build:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ['authService', 'chatService', 'messageService', 'userService']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Convert service name for artifact download
        run: |
          SERVICE_NAME=${{ matrix.service }}
          ARTIFACT_NAME=$(echo "$SERVICE_NAME" | sed 's/\([A-Z]\)/-\L\1/g' | sed 's/^-//')
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ env.ARTIFACT_NAME }}
          path: ${{ matrix.service }}/build/libs/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Convert service name for Docker tags
        run: |
            SERVICE_NAME=${{ matrix.service }}
            DOCKER_NAME=$(echo "$SERVICE_NAME" | sed 's/Service/-service/')
            echo "DOCKER_NAME=$DOCKER_NAME" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
            context: ./${{ matrix.service }}
            push: true
            tags: |
              ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_NAME }}:dev
              ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_NAME }}:${{ github.sha }}
            build-args: |
              JAR_FILE=build/libs/*.jar

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev


    steps:
      - name: Verify compose file exists
        run: |
          echo "Current directory: $(pwd)"
          echo "Files:"
          ls -la
          echo "Content of compose-dev.yaml:"
          cat compose-dev.yaml || echo "File not found!"


      - name: Deploy to development server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            #!/bin/bash
            echo "Starting deployment to dev server"
            
            curl -L -o compose-dev.yaml "https://raw.githubusercontent.com/petraart1/messenger/dev/compose-dev.yaml"

            cat > .env << EOF
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            
            DB_PORT=5432
            
            AUTH_DB_CONTAINER_NAME=${{ secrets.AUTH_DB_CONTAINER_NAME }}
            CHAT_DB_CONTAINER_NAME=${{ secrets.CHAT_DB_CONTAINER_NAME }}
            MESSAGE_DB_CONTAINER_NAME=${{ secrets.MESSAGE_DB_CONTAINER_NAME }}
            USER_DB_CONTAINER_NAME=${{ secrets.USER_DB_CONTAINER_NAME }}
            
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EOF
            
            docker-compose -f compose-dev.yaml down

            docker pull ${{ secrets.DOCKER_USERNAME }}/auth-service:dev
            docker pull ${{ secrets.DOCKER_USERNAME }}/chat-service:dev
            docker pull ${{ secrets.DOCKER_USERNAME }}/message-service:dev
            docker pull ${{ secrets.DOCKER_USERNAME }}/user-service:dev
            
            docker-compose -f compose-dev.yaml up -d
            
            sleep 10
            echo "Deployment status:"
            docker ps -a

            # Проверяем логи каждого сервиса
            echo "Checking services logs..."
            for service in auth chat message user; do
              echo "=== $service logs ==="
              docker logs $service --tail 20 || echo "Could not get logs for $service"
            done

            echo "Deployment completed successfully!"
            echo "Services available on:"
            echo "Auth: http://localhost:8080"
            echo "Chat: http://localhost:8081" 
            echo "Message: http://localhost:8082"
            echo "User: http://localhost:8083"
            echo "Nginx: http://localhost:80"
            echo "Prometheus: http://localhost:9090"
