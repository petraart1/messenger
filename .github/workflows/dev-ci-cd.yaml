name: develop ci/cd pipeline

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ['authService', 'chatService', 'messageService', 'userService']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Test ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          chmod +x gradlew
          ./gradlew test

      - name: Build ${{ matrix.service }}
        run: |
            cd ${{ matrix.service }}
            chmod +x gradlew
            ./gradlew assemble -x test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
            name: build-${{ matrix.service }}
            path: ${{ matrix.service }}/build/libs/*.jar

  build:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ 'auth-service', 'chat-service', 'message-service', 'user-service' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.service }}
          path: ${{ matrix.service }}/build/libs/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:dev
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          build-args: |
            JAR_FILE=build/libs/*.jar

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Deploy to development server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            #!/bin/bash
            echo "Starting deployment to dev server"
            
            # 1. Создаем docker-compose для БД
            cat > docker-compose-db.yml << 'EOF'
            services:
              auth-db:
                image: 'postgres:16-alpine'
                container_name: auth-db
                environment:
                  POSTGRES_DB: ${POSTGRES_DB}
                  POSTGRES_USER: ${POSTGRES_USER}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                ports:
                  - "5432:5432"
                volumes:
                  - auth_db_data:/var/lib/postgresql/data:rw
                healthcheck:
                  test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
                  interval: 5s
                  timeout: 3s
                  retries: 3
                networks:
                  - app
            
              chat-db:
                image: 'postgres:16-alpine'
                container_name: chat-db
                environment:
                  POSTGRES_DB: ${POSTGRES_DB}
                  POSTGRES_USER: ${POSTGRES_USER}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                ports:
                  - "5433:5432"
                volumes:
                  - chat_db_data:/var/lib/postgresql/data:rw
                healthcheck:
                  test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
                  interval: 5s
                  timeout: 3s
                  retries: 3
                networks:
                  - app
            
              message-db:
                image: 'postgres:16-alpine'
                container_name: message-db
                environment:
                  POSTGRES_DB: ${POSTGRES_DB}
                  POSTGRES_USER: ${POSTGRES_USER}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                ports:
                  - "5434:5432"
                volumes:
                  - message_db_data:/var/lib/postgresql/data:rw
                healthcheck:
                  test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
                  interval: 5s
                  timeout: 3s
                  retries: 3
                networks:
                  - app
            
              user-db:
                image: 'postgres:16-alpine'
                container_name: user-db
                environment:
                  POSTGRES_DB: ${POSTGRES_DB}
                  POSTGRES_USER: ${POSTGRES_USER}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                ports:
                  - "5435:5432"
                volumes:
                  - user_db_data:/var/lib/postgresql/data:rw
                healthcheck:
                  test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
                  interval: 5s
                  timeout: 3s
                  retries: 3
                networks:
                  - app
            
            volumes:
              auth_db_data:
              chat_db_data:
              message_db_data:
              user_db_data:
            
            networks:
              app:
                driver: bridge
            EOF
            
            # 2. Запускаем БД с переменными окружения
            export POSTGRES_DB=defaultdb
            export POSTGRES_USER=devuser
            export POSTGRES_PASSWORD=devpassword
            
            echo "Starting databases..."
            docker-compose -f docker-compose-db.yml up -d
            
            # 3. Ждем пока БД запустятся
            echo "Waiting for databases to be healthy..."
            sleep 10
            
            # 4. Деплоим микросервисы
            SERVICES=("authService" "chatService" "messageService" "userService")
            
            for service in "${SERVICES[@]}"; do
              echo "Deploying $service..."
            
              # Pull latest image
              docker pull ${{ secrets.DOCKER_USERNAME }}/$service:dev
            
              # Stop and remove old container
              docker stop $service || true
              docker rm $service || true
            
              # Run new container
              docker run -d \
                --name $service \
                --network=app \
                -e SPRING_PROFILES_ACTIVE=dev \
                -e DB_URL=${{ secrets.DEV_DB_URL }} \
                -e DB_USERNAME=${{ secrets.DEV_DB_USERNAME }} \
                -e DB_PASSWORD=${{ secrets.DEV_DB_PASSWORD }} \
                ${{ secrets.DOCKER_USERNAME }}/$service:dev
            
              echo "$service deployed successfully"
            done
            
            # Clean up
            docker image prune -f
            echo "All services deployed to dev server"