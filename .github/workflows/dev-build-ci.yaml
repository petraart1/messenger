name: develop ci build pipeline

on:
  workflow_run:
    workflows: ["develop ci test pipeline"]
    types: [completed]
    branches: [dev]

jobs:
  build-docker-images:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
        matrix:
          service: [ 'authService', 'chatService', 'messageService', 'userService' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.service }}
          path: ${{ matrix.service }}/build/libs/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
            context: ./${{ matrix.service }}
            push: true
            tags: |
              your-docker-username/${{ matrix.service }}:dev
              your-docker-username/${{ matrix.service }}:${{ github.sha }}
            build-args: |
              JAR_FILE=build/libs/*.jar